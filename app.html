window._ssHideUploadToast = function(success, msg) {

window.uploadToCloudinary = function(file, onProgress) {
  var isVideo = file.type.startsWith("video/");
  var isImage = file.type.startsWith("image/");
  var MB = 1024 * 1024;
  if (isVideo && file.size > 100 * MB) return Promise.reject(new Error("VIDEO_TOO_LARGE"));
  if (isImage && file.size > 5 * MB)   return Promise.reject(new Error("IMAGE_TOO_LARGE"));
  if (!isVideo && !isImage && file.size > 20 * MB) return Promise.reject(new Error("FILE_TOO_LARGE"));
  var apiUrl = "https://api.cloudinary.com/v1_1/" + window.CLOUDINARY_CLOUD + "/auto/upload";
  var MAX_ATTEMPTS = 3;
  window._ssShowUploadToast(0, file.name);
  function attemptUpload(attempt) {
    return new Promise(function(resolve, reject) {
    var formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", window.CLOUDINARY_PRESET);
    var xhr = new XMLHttpRequest();
    xhr.open("POST", apiUrl);
    xhr.upload.onprogress = function(e) {
    if (e.lengthComputable) {
    var pct = Math.round((e.loaded / e.total) * 100);
    window._ssShowUploadToast(pct, file.name);
    if (onProgress) onProgress(pct);
    }
    };
    xhr.onload = function() {
    try {
    var res = JSON.parse(xhr.responseText);
    if (res.secure_url) {
    resolve(res.secure_url);
    } else {
    reject(new Error((res.error && res.error.message) || "Upload failed"));
    }
    } catch(e) {
    reject(new Error("Invalid server response"));
    }
    };
    xhr.onerror = function() { reject(new Error("Network error")); };
    xhr.ontimeout = function() { reject(new Error("Timeout")); };
    xhr.timeout = 60000;
    xhr.send(formData);
    });
  }
  function tryWithRetry(attempt) {
    return attemptUpload(attempt).then(function(url) {
    window._ssHideUploadToast(true);
    return url;
    }).catch(function(err) {
    if (attempt < MAX_ATTEMPTS) {
    var retryLabel = document.getElementById("ss-ut-label");
    if (retryLabel) retryLabel.textContent = "🔄 Retry " + attempt + "/" + (MAX_ATTEMPTS-1) + "...";
    return new Promise(function(res) { setTimeout(res, 1500); }).then(function() {
    return tryWithRetry(attempt + 1);
    });
    }
    window._ssHideUploadToast(false, "Upload failed. Check internet & try again.");
    return Promise.reject(err);
    });
  }
  return tryWithRetry(1);
};

function deduplicateById(arr) {
if (!Array.isArray(arr)) return [];
const seen = new Map();
const noId = [];
arr.forEach(item => {
if (!item) return;
if (item.id !== undefined && item.id !== null) seen.set(item.id, item);
else noId.push(item); // no id — keep as-is
});
return [...Array.from(seen.values()), ...noId];
}
function deduplicateStudents(arr) {
if (!Array.isArray(arr)) return [];
const seenId = new Map();
arr.forEach(item => {
if (!item || item.id === undefined || item.id === null) return;
if (!seenId.has(item.id)) seenId.set(item.id, item);
});
return Array.from(seenId.values());
}

const SYNC_QUEUE_KEY = "ss_offlineSyncQueue";
function getOfflineQueue() {
try { const s = localStorage.getItem(SYNC_QUEUE_KEY); return s ? JSON.parse(s) : []; } catch { return []; }
}
function addToOfflineQueue(key, value) {
try {
const q = getOfflineQueue();
const filtered = q.filter(item => item.key !== key);
const fbPath = getFirebasePath(key);
filtered.push({ key, value, fbPath, ts: Date.now() });
localStorage.setItem(SYNC_QUEUE_KEY, JSON.stringify(filtered));
} catch {}
}
function clearOfflineQueue() {
try { localStorage.removeItem(SYNC_QUEUE_KEY); } catch {}
}
async function flushOfflineQueue() {
if (!window.firebaseReady || !navigator.onLine) return;
const q = getOfflineQueue();
if (q.length === 0) return;
for (const item of q) {
try {
const fbPath = item.fbPath || ("schoolshield/" + item.key);
await window.db.ref(fbPath).set(item.value);
} catch(e) {
return; // Stop on first failure
}
}
clearOfflineQueue();
}
if (typeof window !== "undefined") {
window.addEventListener("online", () => {
setTimeout(flushOfflineQueue, 1500);
});
}
function useNetworkStatus() {
const [online, setOnline] = React.useState(navigator.onLine);
React.useEffect(() => {
const goOnline  = () => { setOnline(true);  flushOfflineQueue(); };
const goOffline = () => setOnline(false);
window.addEventListener("online",  goOnline);
window.addEventListener("offline", goOffline);
return () => {
window.removeEventListener("online",  goOnline);
window.removeEventListener("offline", goOffline);
};
}, []);
return online;
}

window._alarmStopped = false;
window._alarmCtx = null;
function stopAlarm() {
window._alarmStopped = true;
try { if(window._alarmCtx) { window._alarmCtx.close(); window._alarmCtx = null; } } catch(e){}
}
function playAlarm(type) {
window._alarmStopped = false;
let round = 0;
const totalRounds = 3;
function playOneRound() {
if(window._alarmStopped || round >= totalRounds) return;
round++;
try {
const ctx = new (window.AudioContext || window.webkitAudioContext)();
window._alarmCtx = ctx;
const beep = (freq, start, dur, wave) => {
if(window._alarmStopped) return;
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.connect(gain); gain.connect(ctx.destination);
osc.frequency.value = freq; osc.type = wave || "square";
gain.gain.setValueAtTime(0.5, ctx.currentTime + start);
gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
osc.start(ctx.currentTime + start);
osc.stop(ctx.currentTime + start + dur);
};
if (type === "teacher") {
for(let i = 0; i < 3; i++) {
beep(1200, i * 0.5, 0.1, "sine");
beep(900, i * 0.5 + 0.15, 0.1, "sine");
}
} else {
for(let i = 0; i < 6; i++) {
beep(880, i * 0.3, 0.2, "square");
beep(440, i * 0.3 + 0.15, 0.15, "square");
}
}
setTimeout(() => {
try { ctx.close(); } catch(e){}
playOneRound();
}, type === "teacher" ? 1600 : 1900);
} catch(e){}
}
playOneRound();
if (type !== "teacher") startScreenFlicker();
}
function startScreenFlicker() {
if(document.getElementById("ss-flicker")) return;
const flash = document.createElement("div");
flash.id = "ss-flicker";
flash.style.cssText = "position:fixed;inset:0;z-index:99998;pointer-events:none;background:white;opacity:0;";
document.body.appendChild(flash);
let count = 0;
const maxFlicks = 18; // 3 rounds * 6 flicks
const interval = setInterval(() => {
if(window._alarmStopped || count >= maxFlicks) {
clearInterval(interval);
flash.remove();
return;
}
flash.style.opacity = count % 2 === 0 ? "0.6" : "0";
count++;
}, 180);
}
async function saveFcmToken(parentPhone, schoolId) {
if (!window.fcmMessaging || !window.firebaseReady) return null;
if (!window.FCM_VAPID_KEY || window.FCM_VAPID_KEY === "YOUR_VAPID_KEY_HERE") {
return null;
}
try {
const permission = await Notification.requestPermission();
if (permission !== "granted") { console.warn("Notification permission denied"); return null; }
const token = await window.fcmMessaging.getToken({ vapidKey: window.FCM_VAPID_KEY, serviceWorkerRegistration: window.swRegistration });
if (token && window.firebaseReady) {
const safePhone = (parentPhone || "unknown").replace(/[^a-zA-Z0-9]/g, "_");
window.db.ref(`schoolshield/fcmTokens/${schoolId}/${safePhone}`).set({ token, updatedAt: Date.now() });
localStorage.setItem("ss_fcm_token", token);
}
return token;
} catch(e) { console.warn("FCM token error:", e); return null; }
}

function sendPanicAlert(studentName, setAlerts, toast, isAll, studentObj, schoolId, busContext) {
playAlarm();
const now = new Date();
const timeStr = now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");
const finalizeSend = (locationData) => {
const alertObj = {
id: Date.now(),
type: "PANIC",
studentName: isAll ? "🚨 ALL STUDENTS" : studentName,
parentPhone: isAll ? "ALL" : (studentObj?.parentPhone || ""),
studentId: isAll ? "ALL" : (studentObj?.id || ""),
message: isAll ? "MASS PANIC ALERT — All students!" : `PANIC ALERT — ${studentName}`,
time: timeStr,
read: false,
isPanic: true,
schoolId: schoolId || null,
busLat: locationData?.lat || null,
busLng: locationData?.lng || null,
busNo: locationData?.busNo || busContext?.busNo || null,
busMapLink: locationData?.lat ? `https://maps.google.com/maps?q=${locationData.lat},${locationData.lng}` : null,
};
setAlerts(p=>[alertObj,...p]);
const locMsg = alertObj.busLat ? ` 📍 Bus Location: ${alertObj.busMapLink}` : "";
toast(isAll?"🚨 PANIC SENT TO ALL PARENTS!":"🚨 PANIC ALERT SENT!" + locMsg, "error");
if(window.firebaseReady) {
window.db.ref("schoolshield/panicAlerts").push(alertObj);
triggerFcmPanic(alertObj, alertObj.schoolId);
}
};
if (window.firebaseReady && busContext?.id) {
window.db.ref(`schoolshield/busLocations/${busContext.id}`).once("value").then(snap => {
finalizeSend(snap.exists() ? snap.val() : null);
}).catch(() => finalizeSend(null));
} else if (navigator.geolocation) {
navigator.geolocation.getCurrentPosition(
pos => finalizeSend({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
() => finalizeSend(null),
{ timeout: 3000 }
);
} else {
finalizeSend(null);
}
}
function useParentPanicListener(role, loggedInUser, students) {
useEffect(()=>{
const isParent = role === "parent" || window.NO_LOGIN_PARENT_MODE;
if(!isParent || !window.firebaseReady) return;
const myStudent = students.find(s =>
s.parentPhone === loggedInUser?.phone ||
s.id === loggedInUser?.studentId ||
String(s.id) === String(loggedInUser?.studentId)
);
const mySchoolId = loggedInUser?.schoolId || window.PARENT_SCHOOL_ID || null;
const cleanSchoolId = String(mySchoolId).replace(/[^a-zA-Z0-9]/g,"");
const ref = window.db.ref(`schoolshield/schools/SCH_${cleanSchoolId}/alerts`);
const cutoff = Date.now() - 60000;
let lastTopId = null;
ref.on("value", snap=>{
const raw = snap.val();
if(!raw) return;
let arr = [];
try { arr = typeof raw === "string" ? JSON.parse(raw) : (Array.isArray(raw) ? raw : []); } catch { return; }
if(!arr.length) return;
const latest = arr[0];
if(!latest || !latest.isPanic) return;
if(latest.id === lastTopId) return;
if(latest.id && latest.id < cutoff) return;
lastTopId = latest.id;
const isAllAlert = latest.parentPhone === "ALL" || latest.studentName === "\uD83D\uDEA8 ALL STUDENTS";
const phoneMatch = myStudent && latest.parentPhone && latest.parentPhone === myStudent.parentPhone;
const idMatch = myStudent && latest.studentId && String(latest.studentId) === String(myStudent.id);
if(isAllAlert || phoneMatch || idMatch) {
playAlarm();
showFullScreenPanic(latest);
}
});
return ()=>ref.off();
},[role, loggedInUser, students]);
}
